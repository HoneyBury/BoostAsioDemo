name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure_preset: default
            build_preset: default
            test_preset: default
          - os: macos-latest
            configure_preset: default
            build_preset: default
            test_preset: default
          - os: windows-2022
            configure_preset: windows-ninja-debug
            build_preset: windows-ninja-debug
            test_preset: windows-ninja-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.build_preset }} --parallel

      - name: Test
        run: ctest --preset ${{ matrix.test_preset }} --timeout 300

      - name: R4 contract gate
        run: python scripts/verify_r4_contract.py --build-dir build/${{ matrix.configure_preset }} --skip-build --skip-arch-baseline --configuration Debug

      - name: Monitoring operability gate
        run: python scripts/check_monitoring_operability.py --summary-path runtime/validation/ci-monitoring-operability-summary.json

  multi-process-build:
    runs-on: ${{ matrix.os }}
    needs: build-and-test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake --preset ${{ matrix.os == 'windows-2022' && 'windows-ninja-debug' || 'default' }}

      - name: Build all targets
        run: cmake --build --preset ${{ matrix.os == 'windows-2022' && 'windows-ninja-debug' || 'default' }} --parallel --target v2_gateway_demo v2_login_backend v2_room_backend v2_battle_backend v2_leaderboard_backend

      - name: Verify binaries exist
        run: |
          python -c "
          import os, sys
          binaries = ['v2_gateway_demo', 'v2_login_backend', 'v2_room_backend', 'v2_battle_backend', 'v2_leaderboard_backend']
          build_dir = 'build/${{ matrix.os == 'windows-2022' && 'windows-ninja-debug' || 'default' }}'
          ext = '${{ matrix.os == 'windows-2022' && '.exe' || '' }}'
          missing = [b for b in binaries if not os.path.exists(os.path.join(build_dir, b + ext))]
          if missing:
              print(f'Missing binaries: {missing}')
              sys.exit(1)
          print(f'All {len(binaries)} binaries found in {build_dir}')
          "

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare third-party archives
        run: bash third_party/download_deps.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: boost-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name boost-gateway-test -p 9201:9201 -p 9081:9080 boost-gateway:latest --io-cores 1 --management-port 9080
          sleep 5
          curl -f http://localhost:9081/health || (docker logs boost-gateway-test && exit 1)
          docker stop boost-gateway-test

  raft-ha-weekly:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Configure
        run: cmake --preset default

      - name: Build
        run: cmake --build --preset default --parallel

      - name: Run Raft HA specialized E2E
        run: |
          python scripts/verify_specialized_e2e.py \
            --build-dir build/default \
            --filter raft_integration \
            --skip-build

      - name: Upload Raft test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raft-ha-weekly-results
          path: build/default/test-results/
          retention-days: 30
