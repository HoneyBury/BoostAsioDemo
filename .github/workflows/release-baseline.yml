name: Release Baseline

on:
  workflow_dispatch:
    inputs:
      preset:
        description: 'Performance preset (smoke, baseline, capacity)'
        required: true
        default: 'smoke'
      repetitions:
        description: 'Number of repetitions'
        required: false
        default: '1'

permissions:
  contents: read

jobs:
  release-baseline:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure (Release)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_FLAGS_RELEASE="-O2 -DNDEBUG"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Run release baseline
        run: |
          python scripts/collect_release_baseline.py \
            --build-dir build \
            --perf-preset ${{ github.event.inputs.preset }} \
            --perf-repetitions ${{ github.event.inputs.repetitions }}

      - name: Check gates
        run: |
          python scripts/verify_r4_contract.py \
            --build-dir build \
            --skip-build \
            --configuration Release

      - name: Upload baseline artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-baseline-${{ matrix.os }}-${{ github.event.inputs.preset }}
          path: runtime/perf-results/
          retention-days: 90
