name: Windows CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SCCACHE_DIR: ${{ github.workspace }}/.sccache

on:
  workflow_dispatch:
    inputs:
      runner:
        description: 'Runner JSON string or array, for example ["self-hosted","Windows","X64"]'
        required: true
        default: '["self-hosted","Windows","X64"]'
      configure_preset:
        description: "CMake configure preset"
        required: true
        default: "windows-ninja-debug"
      build_preset:
        description: "CMake build preset"
        required: true
        default: "windows-ninja-debug"
      test_preset:
        description: "CTest preset"
        required: true
        default: "windows-ninja-debug"

permissions:
  contents: read

jobs:
  windows-build-and-test:
    runs-on: ${{ fromJSON(inputs.runner || '["self-hosted","Windows","X64"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: false
          fetch-depth: 0

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-${{ runner.os }}-${{ inputs.configure_preset || 'windows-ninja-debug' }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'cmake/**', 'sdk/CMakeLists.txt', 'proto/CMakeLists.txt') }}
          restore-keys: |
            sccache-${{ runner.os }}-${{ inputs.configure_preset || 'windows-ninja-debug' }}-
            sccache-${{ runner.os }}-

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Show tool versions
        shell: powershell
        run: |
          cmake --version
          ninja --version
          python --version

      - name: Ensure sccache
        shell: powershell
        run: |
          if (-not (Get-Command sccache -ErrorAction SilentlyContinue)) {
            choco install sccache -y --no-progress
          }
          sccache --version

      - name: Reset sccache stats
        shell: powershell
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --zero-stats
          }

      - name: Configure
        run: cmake --preset ${{ inputs.configure_preset || 'windows-ninja-debug' }} -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        run: cmake --build --preset ${{ inputs.build_preset || 'windows-ninja-debug' }} --parallel

      - name: Test
        run: ctest --preset ${{ inputs.test_preset || 'windows-ninja-debug' }} --timeout 300

      - name: R4 contract gate
        run: python scripts/verify_r4_contract.py --build-dir build/windows-ninja-debug --skip-build --skip-arch-baseline --configuration Debug

      - name: Monitoring operability gate
        run: python scripts/check_monitoring_operability.py --summary-path runtime/validation/windows-ci-monitoring-operability-summary.json

      - name: Show sccache stats
        if: always()
        continue-on-error: true
        shell: powershell
        run: |
          if (Get-Command sccache -ErrorAction SilentlyContinue) {
            sccache --show-stats
          }
