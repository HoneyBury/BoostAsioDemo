# 网关监听端口
gateway.port=9000

# 网络线程数
gateway.io_threads=2

# 业务线程池大小
gateway.business_threads=2

# 指标日志输出间隔，单位毫秒
gateway.metrics_log_interval_ms=5000

# Session 配置
session.max_packet_size=1048576
session.max_pending_write_bytes=262144
session.heartbeat_check_interval_ms=5000
session.heartbeat_timeout_ms=30000
