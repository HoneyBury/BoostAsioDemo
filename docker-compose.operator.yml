# Boost Gateway -- Operator Development Docker Compose
#
# Focused compose file for local development of the GatewayServer
# operator. Builds the gateway server image and runs the operator
# with all required dependencies.
#
# Usage:
#   docker compose -f docker-compose.operator.yml up -d
#   docker compose -f docker-compose.operator.yml down -v
#
# For the full stack (with backends, Redis, monitoring), use:
#   docker compose -f env/docker/docker-compose.yml up -d

name: boost-gateway-operator-dev

networks:
  boost-net:
    driver: bridge

volumes:
  gateway-data:

services:

  # ==========================================================================
  # Gateway Server
  # ==========================================================================
  gateway-server:
    build:
      context: .
      dockerfile: docker/gateway-server.Dockerfile
      args:
        BUILD_TYPE: Release
    container_name: boost-gateway-server
    networks:
      - boost-net
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
      - "${GRPC_PORT:-50051}:50051"
    environment:
      BOOST_LOG_LEVEL: "${BOOST_LOG_LEVEL:-info}"
      BACKEND_ENDPOINT: "${BACKEND_ENDPOINT:-backend-service:9090}"
      DATA_DIR: /data
    volumes:
      - ./config:/app/config:ro
      - gateway-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Grafana Agent (optional -- starts with profile "monitoring")
  # ==========================================================================
  grafana-agent:
    profiles:
      - monitoring
    build:
      context: .
      dockerfile: docker/grafana-agent.Dockerfile
    container_name: boost-grafana-agent
    networks:
      - boost-net
    ports:
      - "${GRAFANA_AGENT_PORT:-12345}:12345"
    volumes:
      - ./docker/agent-config.yaml:/etc/agent/agent.yaml:ro
    restart: unless-stopped
    depends_on:
      - gateway-server
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
