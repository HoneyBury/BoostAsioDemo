version: "3.8"

services:
  gateway:
    build: .
    container_name: boost-gateway
    ports:
      - "9000:9000"
      - "9080:9080"
    volumes:
      - ./config:/app/config:ro
      - gateway_logs:/app/logs
      - gateway_runtime:/app/runtime
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Optional: mock auth service for testing HttpTokenValidator
  mock-auth:
    image: nginx:alpine
    container_name: boost-mock-auth
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx-auth.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - full

volumes:
  gateway_logs:
  gateway_runtime:
