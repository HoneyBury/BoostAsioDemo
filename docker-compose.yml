name: boost-gateway

networks:
  boost-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  prometheus-data:
  alertmanager-data:
  grafana-data:
  redis-data:
  gateway-logs:
  login-logs:
  room-logs:
  battle-logs:
  match-logs:
  leaderboard-logs:
  battle-archive:

services:

  # ==========================================================================
  # Gateway — client-facing TCP ingress (9201), HTTP management on 9080
  # ==========================================================================
  gateway:
    build:
      context: .
      dockerfile: env/docker/Dockerfile.gateway
    container_name: boost-gateway
    networks:
      - boost-net
    ports:
      - "${GATEWAY_HOST_BIND:-0.0.0.0}:9201:9201"
      - "${MANAGEMENT_HOST_BIND:-127.0.0.1}:9080:9080"
    environment:
      MANAGEMENT_PORT: "9080"
      BOOST_LOG_LEVEL: "info"
    volumes:
      - ./config:/app/config:ro
      - ./env/docker/config/gateway.json:/app/config/gateway.json:ro
      - gateway-logs:/app/logs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    pids_limit: 512
    mem_limit: 1024m
    cpus: 2.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command:
      - --http-port
      - "9080"
      - --login-host
      - login-backend
      - --login-port
      - "9202"
      - --room-host
      - room-backend
      - --room-port
      - "9302"
      - --battle-host
      - battle-backend
      - --battle-port
      - "9303"
      - --matchmaking-host
      - matchmaking-backend
      - --matchmaking-port
      - "9304"
      - --leaderboard-host
      - leaderboard-backend
      - --leaderboard-port
      - "9305"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      login-backend:
        condition: service_healthy
      room-backend:
        condition: service_healthy
      battle-backend:
        condition: service_healthy
      matchmaking-backend:
        condition: service_healthy
      leaderboard-backend:
        condition: service_healthy

  # ==========================================================================
  # Login Backend — token validation, session management (port 9202)
  # ==========================================================================
  login-backend:
    build:
      context: .
      dockerfile: env/docker/Dockerfile.backend
      args:
        SERVICE_BINARY: v2_login_backend
    container_name: boost-login-backend
    networks:
      - boost-net
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:9202:9202"
    environment:
      SERVICE_PORT: "9202"
      BOOST_LOG_LEVEL: "info"
    volumes:
      - ./config:/app/config:ro
      - login-logs:/app/logs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9202"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Room Backend — room lifecycle, member management (port 9302)
  # ==========================================================================
  room-backend:
    build:
      context: .
      dockerfile: env/docker/Dockerfile.backend
      args:
        SERVICE_BINARY: v2_room_backend
    container_name: boost-room-backend
    networks:
      - boost-net
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:9302:9302"
    environment:
      SERVICE_PORT: "9302"
      BOOST_LOG_LEVEL: "info"
    volumes:
      - ./config:/app/config:ro
      - room-logs:/app/logs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 256
    mem_limit: 768m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9302"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Battle Backend — ECS tick, replay/archive (port 9303)
  # ==========================================================================
  battle-backend:
    build:
      context: .
      dockerfile: env/docker/Dockerfile.backend
      args:
        SERVICE_BINARY: v2_battle_backend
    container_name: boost-battle-backend
    networks:
      - boost-net
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:9303:9303"
    environment:
      SERVICE_PORT: "9303"
      BOOST_LOG_LEVEL: "info"
    volumes:
      - ./config:/app/config:ro
      - battle-logs:/app/logs
      - battle-archive:/app/v2_archive
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 256
    mem_limit: 1024m
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9303"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Matchmaking Backend — MMR-based player matching (port 9304)
  # ==========================================================================
  matchmaking-backend:
    build:
      context: .
      dockerfile: env/docker/Dockerfile.backend
      args:
        SERVICE_BINARY: v2_match_backend
    container_name: boost-matchmaking-backend
    networks:
      - boost-net
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:9304:9304"
    environment:
      SERVICE_PORT: "9304"
      BOOST_LOG_LEVEL: "info"
    volumes:
      - ./config:/app/config:ro
      - match-logs:/app/logs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9304"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Leaderboard Backend — ranked leaderboard queries (port 9305)
  # ==========================================================================
  leaderboard-backend:
    build:
      context: .
      dockerfile: env/docker/Dockerfile.backend
      args:
        SERVICE_BINARY: v2_leaderboard_backend
    container_name: boost-leaderboard-backend
    networks:
      - boost-net
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:9305:9305"
    environment:
      SERVICE_PORT: "9305"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      BOOST_LOG_LEVEL: "info"
    volumes:
      - ./config:/app/config:ro
      - leaderboard-logs:/app/logs
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 256
    mem_limit: 768m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "9305"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Redis 7 — caching, leaderboard data, event store (port 6379)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: boost-redis
    networks:
      - boost-net
    ports:
      - "${REDIS_HOST_BIND:-127.0.0.1}:${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - ./env/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis-data:/data
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command:
      - redis-server
      - /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ==========================================================================
  # Prometheus — metrics collection (port 9090)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: boost-prometheus
    networks:
      - boost-net
    ports:
      - "${PROMETHEUS_HOST_BIND:-127.0.0.1}:9090:9090"
    volumes:
      - ./env/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./env/monitoring/prometheus-alerts.yml:/etc/prometheus/prometheus-alerts.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    depends_on:
      - gateway
      - login-backend
      - room-backend
      - battle-backend
      - matchmaking-backend
      - leaderboard-backend

  alertmanager:
    image: prom/alertmanager:v0.28.1
    container_name: boost-alertmanager
    networks:
      - boost-net
    ports:
      - "${ALERTMANAGER_HOST_BIND:-127.0.0.1}:9093:9093"
    volumes:
      - ./env/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:v1.69.0
    container_name: boost-redis-exporter
    networks:
      - boost-net
    ports:
      - "${REDIS_EXPORTER_HOST_BIND:-127.0.0.1}:9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      redis:
        condition: service_healthy

  # ==========================================================================
  # Grafana — dashboard visualization (port 3000)
  # ==========================================================================
  grafana:
    image: grafana/grafana:10.4.2
    container_name: boost-grafana
    networks:
      - boost-net
    ports:
      - "${GRAFANA_HOST_BIND:-127.0.0.1}:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-boost-gateway-change-me}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./env/monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./env/monitoring/grafana-dashboard-provider.yml:/etc/grafana/provisioning/dashboards/boost-gateway.yml:ro
      - ./env/monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/boost-gateway.json:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nofile:
        soft: 32768
        hard: 32768
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - prometheus

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: boost-cadvisor
    networks:
      - boost-net
    ports:
      - "${CADVISOR_HOST_BIND:-127.0.0.1}:8081:8080"
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    restart: unless-stopped
    profiles:
      - host-observability
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  prometheus-host-observability:
    image: prom/prometheus:v2.53.0
    container_name: boost-prometheus-host-observability
    networks:
      - boost-net
    ports:
      - "${CADVISOR_PROMETHEUS_HOST_BIND:-127.0.0.1}:9091:9090"
    volumes:
      - ./env/monitoring/prometheus.host-observability.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped
    profiles:
      - host-observability
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    depends_on:
      - cadvisor
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================================================
  # Mock Auth (optional, for token validation testing — use with --profile full)
  # ==========================================================================
  mock-auth:
    image: nginx:alpine
    container_name: boost-mock-auth
    ports:
      - "8080:80"
    volumes:
      - ./config/nginx-auth.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - full
