# Additional scrape config for the optional host-observability profile.
#
# This file is mounted only when the `host-observability` Compose profile is
# enabled together with the `cadvisor` service.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "cadvisor"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "cadvisor:8080"
        labels:
          service: "cadvisor"
          tier: "monitoring"
