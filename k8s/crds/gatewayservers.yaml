# GatewayServer Custom Resource Definition
#
# Defines the schema for GatewayServer custom resources, which are
# managed by the kopf-based operator in k8s/operator/operator.py.
#
# Installed automatically by deploy-operator.ps1.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gatewayservers.gateway.boost.io
spec:
  group: gateway.boost.io
  names:
    kind: GatewayServer
    listKind: GatewayServerList
    plural: gatewayservers
    singular: gatewayserver
    shortNames:
      - gwsrv
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicaCount:
                  type: integer
                  minimum: 0
                  default: 1
                image:
                  type: string
                  default: "gateway-server:latest"
                service:
                  type: object
                  properties:
                    type:
                      type: string
                      enum: [ClusterIP, NodePort, LoadBalancer]
                      default: ClusterIP
                    port:
                      type: integer
                      minimum: 1
                      maximum: 65535
                      default: 8080
                    annotations:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                config:
                  type: object
                  properties:
                    logLevel:
                      type: string
                      default: info
                    backendEndpoint:
                      type: string
                      default: "backend-service:9090"
                    grpcPort:
                      type: integer
                      default: 50051
                    dataDir:
                      type: string
                      default: "/data"
              required:
                - replicaCount
                - image
            status:
              type: object
              properties:
                phase:
                  type: string
                  enum: [Pending, Running, Draining, Stopped]
                  default: Pending
                readyReplicas:
                  type: integer
                  minimum: 0
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      lastTransitionTime:
                        type: string
                        format: date-time
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Replicas
          type: integer
          jsonPath: .spec.replicaCount
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Ready
          type: integer
          jsonPath: .status.readyReplicas
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
