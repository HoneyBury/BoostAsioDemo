apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway-server.fullname" . }}-config
  labels:
    {{- include "gateway-server.labels" . | nindent 4 }}
data:
  gateway-config.yaml: |
    # Gateway Server Configuration
    # Generated by Helm. Do not edit manually.

    server:
      log_level: {{ .Values.config.logLevel }}
      port: {{ .Values.service.port }}
      grpc_port: {{ .Values.config.grpcPort }}
      data_dir: {{ .Values.config.dataDir }}

    backend:
      host: {{ .Values.config.backendHost }}
      port: {{ .Values.config.backendPort }}

    logging:
      level: {{ .Values.config.logLevel }}
      file: {{ .Values.config.dataDir }}/logs/gateway-server.log
      max_size_mb: 100
      max_backups: 7
      max_age_days: 30

    metrics:
      enabled: true
      path: /metrics
