# Gateway Server Helm Chart -- Default Values

# Number of gateway server replicas
replicaCount: 2

# Name overrides
nameOverride: ""
fullnameOverride: ""

# Container image settings
image:
  repository: gateway-server
  tag: latest
  pullPolicy: IfNotPresent

# Image pull secrets
imagePullSecrets: []

# ServiceAccount configuration
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Container security context
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Service configuration
service:
  type: ClusterIP
  port: 8080

# Resource limits and requests
resources:
  requests:
    cpu: "250m"
    memory: "128Mi"
  limits:
    cpu: "1"
    memory: "512Mi"

# Application configuration (rendered into ConfigMap)
config:
  logLevel: "info"
  backendHost: "backend-service"
  backendPort: 9090
  grpcPort: 50051
  dataDir: "/data"

# HorizontalPodAutoscaler configuration
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# PodDisruptionBudget configuration
pdb:
  enabled: true
  minAvailable: "50%"

# Ingress (disabled by default)
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: gateway-server.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Node selector, tolerations, affinity
nodeSelector: {}
tolerations: []
affinity: {}
