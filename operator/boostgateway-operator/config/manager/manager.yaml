apiVersion: apps/v1
kind: Deployment
metadata:
  name: boostgateway-operator-controller-manager
  namespace: boost-gateway-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: boostgateway-operator
      control-plane: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: boostgateway-operator
        control-plane: controller-manager
    spec:
      serviceAccountName: boostgateway-operator-controller-manager
      containers:
        - name: manager
          image: ghcr.io/honeybury/boostgateway-operator:v0.1.0
          command:
            - /manager
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: probes
          readinessProbe:
            httpGet:
              path: /readyz
              port: probes
          livenessProbe:
            httpGet:
              path: /healthz
              port: probes

