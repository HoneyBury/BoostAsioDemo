apiVersion: v1
kind: ServiceAccount
metadata:
  name: boostgateway-operator-controller-manager
  namespace: boost-gateway-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: boostgateway-operator-manager-role
rules:
  - apiGroups: ["gateway.boost.io"]
    resources: ["boostgatewayclusters", "boostgatewayclusters/status", "boostgatewayclusters/finalizers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: boostgateway-operator-manager-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: boostgateway-operator-manager-role
subjects:
  - kind: ServiceAccount
    name: boostgateway-operator-controller-manager
    namespace: boost-gateway-system

