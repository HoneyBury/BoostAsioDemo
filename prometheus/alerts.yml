groups:
  - name: gateway_alerts
    rules:
      - alert: GatewayDown
        expr: up == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "Gateway server is down" }

      - alert: HighErrorRate
        expr: rate(gateway_packets_blocked_total[5m]) > 10
        for: 2m
        labels: { severity: warning }
        annotations: { summary: "High packet block rate: {{ $value }}/s" }

      - alert: ConnectionSaturation
        expr: gateway_active_sessions / 10000 > 0.8
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "Connection saturation at {{ $value | humanizePercentage }}" }

      - alert: SlowConnectionCount
        expr: gateway_active_sessions - gateway_authenticated_sessions > 100
        for: 5m
        labels: { severity: info }
        annotations: { summary: "{{ $value }} unauthenticated sessions" }

      - alert: AuthFailureSpike
        expr: rate(gateway_login_success_total[5m]) < 0.1
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "Login success rate dropped below 0.1/s" }

      - alert: WriteBacklogWarning
        expr: rate(gateway_bytes_sent_total[5m]) < rate(gateway_bytes_received_total[5m]) * 0.5
        for: 5m
        labels: { severity: warning }
        annotations: { summary: "Send rate significantly below receive rate" }

      - alert: NoMetrics
        expr: absent(gateway_sessions_accepted_total)
        for: 2m
        labels: { severity: critical }
        annotations: { summary: "Gateway metrics not being exported" }

  - name: backend_alerts
    rules:
      - alert: BackendLoginDown
        expr: backend_login_up == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "Login backend is down" }

      - alert: BackendRoomDown
        expr: backend_room_up == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "Room backend is down" }

      - alert: BackendBattleDown
        expr: backend_battle_up == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "Battle backend is down" }

      - alert: BackendLoginUnhealthyInstances
        expr: backend_login_unhealthy_instances > 0
        for: 2m
        labels: { severity: warning }
        annotations: { summary: "Login backend has {{ $value }} unhealthy instance(s)" }

      - alert: BackendRoomUnhealthyInstances
        expr: backend_room_unhealthy_instances > 0
        for: 2m
        labels: { severity: warning }
        annotations: { summary: "Room backend has {{ $value }} unhealthy instance(s)" }

      - alert: BackendBattleUnhealthyInstances
        expr: backend_battle_unhealthy_instances > 0
        for: 2m
        labels: { severity: warning }
        annotations: { summary: "Battle backend has {{ $value }} unhealthy instance(s)" }

      - alert: BackendRouteErrorSpike
        expr: rate(backend_route_errors_total[5m]) > 5
        for: 2m
        labels: { severity: warning }
        annotations: { summary: "Backend routing error rate: {{ $value }}/s" }

      - alert: BackendTimeoutSpike
        expr: rate(backend_route_timeouts_total[5m]) > 3
        for: 2m
        labels: { severity: warning }
        annotations: { summary: "Backend routing timeout rate: {{ $value }}/s" }

      - alert: BackendAllInstancesUnhealthy
        expr: backend_login_healthy_instances == 0 or backend_room_healthy_instances == 0 or backend_battle_healthy_instances == 0
        for: 1m
        labels: { severity: critical }
        annotations: { summary: "All instances of a backend service are unhealthy" }
