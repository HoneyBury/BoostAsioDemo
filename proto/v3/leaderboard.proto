// v3.0.0: Leaderboard service protocol definition.
syntax = "proto3";
package boost.gateway.v3;

message LeaderboardSubmitRequest {
  string user_id = 1;
  string display_name = 2;
  int64 score = 3;
}

message LeaderboardSubmitResponse {
  string user_id = 1;
  int64 rank = 2;
}

message LeaderboardTopRequest {
  int32 k = 1;                 // top K (max 100)
}

message LeaderboardEntry {
  int64 rank = 1;
  string user_id = 2;
  string display_name = 3;
  int64 score = 4;
}

message LeaderboardTopResponse {
  repeated LeaderboardEntry entries = 1;
}

message LeaderboardRankRequest {
  string user_id = 1;
}

message LeaderboardRankResponse {
  string user_id = 1;
  int64 rank = 2;
  int64 score = 3;
}
