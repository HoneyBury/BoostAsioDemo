// v3.0.0: Matchmaking service protocol definition.
syntax = "proto3";
package boost.gateway.v3;

message MatchJoinRequest {
  string user_id = 1;
  int64 mmr = 2;               // matchmaking rating
  string mode = 3;             // "1v1", "2v2", "4v4"
}

message MatchJoinResponse {
  bool queued = 1;
  string mode = 2;
}

message MatchLeaveRequest {
  string user_id = 1;
  string mode = 2;
}

message MatchStatusRequest {
  string user_id = 1;
  string mode = 2;
}

message MatchStatusResponse {
  bool matched = 1;
  string match_id = 2;
  string mode = 3;
  int64 avg_mmr = 4;
  int32 queue_size = 5;
}

message MatchFoundPush {
  string match_id = 1;
  string mode = 2;
  int64 avg_mmr = 3;
  repeated string player_ids = 4;
}
